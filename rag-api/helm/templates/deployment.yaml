apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: rag
  labels:
    app: rag-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
    spec:
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      containers:
        - name: rag-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: QDRANT_URL
              value: http://qdrant.rag.svc.cluster.local:6333
            - name: OLLAMA_URL
              value: http://ollama.ai-system.svc.cluster.local:11434
            - name: MINIO_ENDPOINT
              value: minio.rag.svc.cluster.local:9000
          resources:
{{ toYaml .Values.resources | indent 12 }}
