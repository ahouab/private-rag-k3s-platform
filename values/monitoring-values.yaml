grafana:
  enabled: true
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 10Gi
prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 30Gi
alertmanager:
  enabled: true
