apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: proxmox-lab-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ahouab/private-rag-k3s-platform.git
    targetRevision: main
    path: apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
