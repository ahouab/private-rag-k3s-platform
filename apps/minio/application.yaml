apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.min.io/
    chart: minio
    targetRevision: 5.4.0
    helm:
      values: |
        persistence:
          enabled: true
          storageClass: longhorn
          size: 100Gi
        buckets:
          - name: documents-raw
            policy: none
            purge: false
          - name: documents-processed
            policy: none
            purge: false
  destination:
    server: https://kubernetes.default.svc
    namespace: rag
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
